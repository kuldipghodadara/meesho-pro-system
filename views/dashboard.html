<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meesho Pro | User Management</title>
    <style>
        :root { 
            --primary: #6366f1; 
            --bg: #f8fafc; 
            --text: #1e293b; 
            --danger: #ef4444; 
            --success: #10b981; 
            --warning: #f59e0b; 
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 25px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
        
        .btn { border: none; padding: 8px 12px; cursor: pointer; border-radius: 6px; font-size: 12px; font-weight: 600; transition: 0.2s; margin-right: 4px; }
        .btn-verify { background: #dcfce7; color: #166534; }
        .btn-verify:hover { background: #bbf7d0; }
        .btn-block { background: #fee2e2; color: #991b1b; }
        .btn-block:hover { background: #fecaca; }
        .btn-delete { background: #334155; color: white; }
        .btn-delete:hover { background: #0f172a; }
        
        .status-online { color: var(--success); font-weight: bold; }
        .status-offline { color: #94a3b8; }
        code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; color: var(--primary); font-family: monospace; }
        
        .badge { padding: 4px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; }
        .badge-active { background: #dcfce7; color: #166534; }
        .badge-blocked { background: #fee2e2; color: #991b1b; }
        .badge-trial { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>

    <div class="header">
        <h1>User Management Panel</h1>
        <button class="btn btn-delete" onclick="fetchUsers()">🔄 Refresh Data</button>
    </div>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>User Details</th>
                    <th>Seller Info & IP</th>
                    <th>System Status</th>
                    <th>Subscription</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userList">
                </tbody>
        </table>
    </div>

    <script>
        let allUsers = [];

        async function fetchUsers() {
            try {
                const res = await fetch('/api/admin/users');
                allUsers = await res.json();
                renderTable();
            } catch (err) {
                console.error("Failed to load users", err);
            }
        }

        function renderTable() {
            const list = document.getElementById('userList');
            if (allUsers.length === 0) {
                list.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:40px;">No users found in database.</td></tr>`;
                return;
            }

            list.innerHTML = allUsers.map(u => `
                <tr>
                    <td>
                        <div style="font-weight:700;">${u.mobile}</div>
                        <div style="margin-top:4px;">PW: <code>${u.password}</code></div>
                    </td>
                    <td>
                        <div style="font-weight:600;">${u.seller_name || 'Unnamed Seller'}</div>
                        <div style="font-size:12px; color:#64748b; margin-top:2px;">
                            IP: ${u.user_ip || '---'}
                        </div>
                    </td>
                    <td>
                        <div class="${u.is_online ? 'status-online' : 'status-offline'}">
                            ${u.is_online ? '● Online' : '○ Offline'}
                        </div>
                        <div style="margin-top:4px;">
                            ${getStatusBadge(u.is_verified)}
                        </div>
                    </td>
                    <td>
                        <div style="font-size:12px;">Plan: <b>${u.plan || 'Trial'}</b></div>
                        <div style="font-size:11px; color:#64748b;">Exp: ${u.expiry_date || 'N/A'}</div>
                    </td>
                    <td>
                        <button class="btn btn-verify" onclick="updateStatus('${u.mobile}', 1)">Verify</button>
                        <button class="btn btn-block" onclick="updateStatus('${u.mobile}', -1)">Block</button>
                        <button class="btn btn-delete" onclick="deleteUser('${u.mobile}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusBadge(status) {
            if (status === 1) return '<span class="badge badge-active">APPROVED</span>';
            if (status === -1) return '<span class="badge badge-blocked">BLOCKED</span>';
            return '<span class="badge badge-trial">PENDING/TRIAL</span>';
        }

        async function updateStatus(mobile, status) {
            if(!confirm(`Change status for ${mobile}?`)) return;
            await fetch('/api/admin/update-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mobile, status })
            });
            fetchUsers();
        }

        async function deleteUser(mobile) {
            if(!confirm(`🔴 PERMANENTLY DELETE ${mobile}?\nThis cannot be undone.`)) return;
            await fetch('/api/admin/delete-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mobile })
            });
            fetchUsers();
        }

        // Initial Load
        fetchUsers();
        
        // Auto-refresh every 30 seconds to track online status
        setInterval(fetchUsers, 30000);
    </script>
</body>
</html>
