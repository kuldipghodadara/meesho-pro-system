<!DOCTYPE html>
<html>
<head>
    <title>Meesho Pro | Management</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; font-size: 13px; }
        th { background: #6366f1; color: white; }
        .btn { padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; margin: 2px; }
        .btn-view { background: #0ea5e9; color: white; }
        .btn-block { background: #ef4444; color: white; }
        
        /* Popup Styling */
        #detailsPopup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .popup-box { background: white; padding: 30px; border-radius: 15px; width: 400px; position: relative; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px inset #f1f5f9; }
        .label { font-weight: bold; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>User Management Panel</h1>
        <table>
            <thead>
                <tr>
                    <th>Mobile</th>
                    <th>Reg Date</th>
                    <th>End Date (Expiry)</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userList"></tbody>
        </table>
    </div>

    <div id="detailsPopup">
        <div class="popup-box">
            <h3>Seller Information</h3>
            <div id="popupContent"></div>
            <button class="btn btn-block" style="width:100%; margin-top:20px;" onclick="closePopup()">Close</button>
        </div>
    </div>

    <script>
        let usersData = [];

        async function fetchUsers() {
            const res = await fetch('/api/admin/users');
            usersData = await res.json();
            const list = document.getElementById('userList');
            
            list.innerHTML = usersData.map(u => {
                const regDate = new Date(u.reg_date).toLocaleDateString();
                const expiryVal = u.expiry_date ? u.expiry_date.split('T')[0] : '';

                return `
                    <tr>
                        <td><b>${u.mobile}</b></td>
                        <td>${regDate}</td>
                        <td>
                            <input type="date" value="${expiryVal}" 
                                   onchange="setExpiry('${u.mobile}', this.value)">
                        </td>
                        <td>${u.is_verified === 1 ? '✅ Active' : u.is_verified === -1 ? '❌ Blocked' : '⏳ Trial'}</td>
                        <td>
                            <button class="btn btn-view" onclick="showPopup('${u.mobile}')">View Info</button>
                            <button class="btn btn-block" onclick="updateStatus('${u.mobile}', -1)">Block</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function setExpiry(mobile, date) {
            await fetch('/api/admin/update-expiry', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mobile, expiry_date: date })
            });
            alert("Expiry Date Updated. User will auto-block after this date.");
        }

        function showPopup(mobile) {
            const user = usersData.find(u => u.mobile === mobile);
            const content = document.getElementById('popupContent');
            content.innerHTML = `
                <div class="detail-row"><span class="label">Seller Name:</span> <span>${user.seller_name || 'N/A'}</span></div>
                <div class="detail-row"><span class="label">GST:</span> <span>${user.gst_number || 'N/A'}</span></div>
                <div class="detail-row"><span class="label">Email:</span> <span>${user.email || 'N/A'}</span></div>
                <div class="detail-row"><span class="label">HWID:</span> <span style="font-size:10px;">${user.hwid || 'N/A'}</span></div>
                <div class="detail-row"><span class="label">Last IP:</span> <span>${user.user_ip || 'N/A'}</span></div>
            `;
            document.getElementById('detailsPopup').style.display = 'flex';
        }

        function closePopup() { document.getElementById('detailsPopup').style.display = 'none'; }
        
        async function updateStatus(mobile, status) {
            await fetch('/api/admin/update-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mobile, status })
            });
            fetchUsers();
        }

        fetchUsers();
    </script>
</body>
</html>
