<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meesho Pro | User Management</title>
    <style>
        :root { --primary: #5f249f; --bg: #f8fafc; --text: #334155; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 25px; margin: 0; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 24px; cursor: pointer; border: none; border-radius: 8px; background: #e2e8f0; font-weight: bold; color: #64748b; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }

        .container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; color: var(--text); padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        .btn { border: none; padding: 7px 12px; cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 11px; color: white; margin-right: 4px; text-transform: uppercase; }
        .btn-view { background: #0ea5e9; }
        .btn-verify { background: var(--success); }
        .btn-delete { background: var(--danger); }
        
        .plan-select, .date-input { padding: 6px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 13px; outline: none; margin-top: 4px; width: 100%; box-sizing: border-box; }
        .date-input { font-family: inherit; color: var(--text); cursor: pointer; background: #fff; }
        
        #modalOverlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(3px); align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; border-radius: 16px; width: 450px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .modal-head { background: var(--primary); color: white; padding: 15px 20px; font-size: 18px; font-weight: bold; }
        .modal-body { padding: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    </style>
</head>
<body>
    <h1 style="color:var(--primary)">Meesho Pro Management Panel</h1>

    <div class="tabs">
        <button class="tab-btn active" id="btnUsers" onclick="switchTab('users')">All Users</button>
        <button class="tab-btn" id="btnConflicts" onclick="switchTab('conflicts')">IP Conflicts</button>
    </div>
    
    <div id="viewUsers" class="container">
        <table>
            <thead>
                <tr>
                    <th>Client ID</th>
                    <th>Mobile</th>
                    <th>Status</th>
                    <th>Set Plan</th>
                    <th>Set Expiry (Auto/Manual)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userList"></tbody>
        </table>
    </div>

    <div id="modalOverlay">
        <div class="modal">
            <div class="modal-head">Seller Details</div>
            <div class="modal-body" id="modalContent"></div>
            <div style="padding: 20px;"><button class="btn" style="background:#64748b; width:100%;" onclick="closeModal()">Close</button></div>
        </div>
    </div>

    <script>
        let allUsers = [];

        async function fetchUsers() {
            const res = await fetch('/api/admin/users');
            allUsers = await res.json();
            renderUserTable();
        }

        async function saveUserAccess(mobile, planOverride = null, dateOverride = null) {
            const plan = planOverride || document.getElementById(`plan-${mobile}`).value;
            const expiryDate = dateOverride || document.getElementById(`date-${mobile}`).value;

            await fetch('/api/admin/update-subscription', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mobile, plan, expiry_date: expiryDate })
            });
            fetchUsers();
        }

        // Logic to calculate date based on plan selection
        function handlePlanChange(mobile, regDate) {
            const planValue = document.getElementById(`plan-${mobile}`).value;
            if (planValue === "Trial") return; // Don't auto-calculate for Trial

            let date = new Date(regDate);
            date.setMonth(date.getMonth() + parseInt(planValue));
            const newDateStr = date.toISOString().split('T')[0];
            
            // Update the UI date input and Save
            document.getElementById(`date-${mobile}`).value = newDateStr;
            saveUserAccess(mobile, planValue, newDateStr);
        }

        function renderUserTable() {
            const list = document.getElementById('userList');
            list.innerHTML = allUsers.map(u => {
                const existingDate = u.expiry_date ? new Date(u.expiry_date).toISOString().split('T')[0] : '';
                
                return `
                <tr>
                    <td><small>${u.client_id || 'N/A'}</small></td>
                    <td><b>${u.mobile}</b><br><small>${u.seller_name || ''}</small></td>
                    <td>
                        ${u.is_online ? '<b style="color:var(--success)">● Online</b>' : '<span style="color:#94a3b8">○ Offline</span>'}
                        <br><small>${u.is_verified === 1 ? '✅ Active' : u.is_verified === -1 ? '❌ Blocked' : '⏳ New'}</small>
                    </td>
                    <td>
                        <select class="plan-select" id="plan-${u.mobile}" onchange="handlePlanChange('${u.mobile}', '${u.reg_date}')">
                            <option value="Trial" ${u.plan === 'Trial' ? 'selected' : ''}>Trial</option>
                            <option value="1" ${u.plan === '1' ? 'selected' : ''}>1 Month</option>
                            <option value="3" ${u.plan === '3' ? 'selected' : ''}>3 Months</option>
                            <option value="12" ${u.plan === '12' ? 'selected' : ''}>1 Year</option>
                        </select>
                    </td>
                    <td>
                        <input type="date" class="date-input" id="date-${u.mobile}" 
                               value="${existingDate}" 
                               onchange="saveUserAccess('${u.mobile}')">
                    </td>
                    <td>
                        <button class="btn btn-view" onclick="viewDetails('${u.mobile}')">View</button>
                        <button class="btn btn-verify" onclick="updateStatus('${u.mobile}', 1)">Verify</button>
                        <button class="btn btn-delete" onclick="deleteUser('${u.mobile}')">Del</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function viewDetails(mobile) {
            const user = allUsers.find(u => u.mobile === mobile);
            document.getElementById('modalContent').innerHTML = `
                <div class="info-row"><b>GST:</b> <span>${user.gst_number || 'N/A'}</span></div>
                <div class="info-row"><b>Email:</b> <span>${user.email || 'N/A'}</span></div>
                <div class="info-row"><b>IP Address:</b> <span>${user.user_ip || 'N/A'}</span></div>
                <div class="info-row"><b>Reg. Date:</b> <span>${new Date(user.reg_date).toLocaleString()}</span></div>
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        
        async function updateStatus(mobile, status) {
            await fetch('/api/admin/update-status', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ mobile, status }) });
            fetchUsers();
        }

        async function deleteUser(mobile) {
            if(confirm("Delete User?")) {
                await fetch('/api/admin/delete-user', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ mobile }) });
                fetchUsers();
            }
        }

        function switchTab(tab) {
            document.getElementById('viewUsers').style.display = tab === 'users' ? 'block' : 'none';
            document.getElementById('btnUsers').classList.toggle('active', tab === 'users');
        }

        fetchUsers();
    </script>
</body>
</html>
