<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meesho Pro | User Management</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --danger: #ef4444; --success: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 25px; }
        .tabs { margin-bottom: 20px; display: flex; gap: 10px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 8px; background: #e2e8f0; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; }
        .container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .conflict-tag { color: var(--danger); font-weight: 800; font-size: 11px; }
    </style>
</head>
<body>
    <h1 style="color:var(--primary)">Logistics Management Dashboard</h1>
    
    <div class="tabs">
        <button class="tab-btn active" id="btn-users" onclick="switchTab('users')">All Users</button>
        <button class="tab-btn" id="btn-conflicts" onclick="switchTab('conflicts')">IP Conflicts</button>
    </div>

    <div class="container" id="view-users">
        <table id="userTable">
            <thead>
                <tr>
                    <th>Mobile</th>
                    <th>Seller</th>
                    <th>IP Address</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="userList"></tbody>
        </table>
    </div>

    <div class="container" id="view-conflicts" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>Flagged IP Address</th>
                    <th>Registered Mobile Numbers</th>
                    <th>Latest Activity</th>
                </tr>
            </thead>
            <tbody id="conflictList"></tbody>
        </table>
    </div>

    <script>
        let allUsers = [];

        async function fetchUsers() {
            const res = await fetch('/api/admin/users');
            allUsers = await res.json();
            renderUsers();
            renderConflicts();
        }

        function renderUsers() {
            const list = document.getElementById('userList');
            list.innerHTML = allUsers.map(u => `
                <tr>
                    <td>${u.mobile}</td>
                    <td>${u.seller_name || 'N/A'}</td>
                    <td>${u.user_ip || 'No IP Recorded'}</td>
                    <td>${u.is_verified === 1 ? 'Approved' : 'Pending'}</td>
                    <td><button onclick="updateStatus('${u.mobile}', 1)">Approve</button></td>
                </tr>
            `).join('');
        }

        function renderConflicts() {
            const list = document.getElementById('conflictList');
            const ipGroups = {};
            
            // Group users by IP address
            allUsers.forEach(u => {
                if (u.user_ip) {
                    if (!ipGroups[u.user_ip]) ipGroups[u.user_ip] = [];
                    ipGroups[u.user_ip].push(u);
                }
            });

            // Find groups with more than 1 user
            const conflicts = Object.keys(ipGroups).filter(ip => ipGroups[ip].length > 1);

            list.innerHTML = conflicts.map(ip => `
                <tr>
                    <td><b class="conflict-tag">${ip}</b></td>
                    <td>${ipGroups[ip].map(u => `<div>${u.mobile} (${u.seller_name})</div>`).join('')}</td>
                    <td>${new Date(ipGroups[ip].sort((a,b) => new Date(b.reg_date) - new Date(a.reg_date))[0].reg_date).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function switchTab(tab) {
            document.getElementById('view-users').style.display = tab === 'users' ? 'block' : 'none';
            document.getElementById('view-conflicts').style.display = tab === 'conflicts' ? 'block' : 'none';
            document.getElementById('btn-users').classList.toggle('active', tab === 'users');
            document.getElementById('btn-conflicts').classList.toggle('active', tab === 'conflicts');
        }

        fetchUsers();
    </script>
</body>
</html>
