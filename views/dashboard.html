<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meesho Pro | User Management</title>
    <style>
        :root { --primary: #5f249f; --bg: #f8fafc; --text: #334155; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 25px; margin: 0; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 24px; cursor: pointer; border: none; border-radius: 8px; background: #e2e8f0; font-weight: bold; color: #64748b; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }

        .container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; color: var(--text); padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        .btn { border: none; padding: 7px 12px; cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 11px; color: white; margin-right: 4px; text-transform: uppercase; }
        .btn-view { background: #0ea5e9; }
        .btn-verify { background: var(--success); }
        .btn-block { background: var(--warning); }
        .btn-delete { background: var(--danger); }
        .btn-primary { background: var(--primary); }
        
        .plan-select, .date-input { padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 13px; outline: none; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .conflict-tag { background: #fee2e2; color: #b91c1c; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        input[type="text"], input[type="number"] { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; }

        #modalOverlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(3px); align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; border-radius: 16px; width: 450px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .modal-head { background: var(--primary); color: white; padding: 15px 20px; font-size: 18px; font-weight: bold; }
        .modal-body { padding: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .info-row:last-child { border-bottom: none; }
        .label { font-weight: bold; color: #64748b; }
        .action-area { background: #f8fafc; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <h1 style="color:var(--primary)">Meesho Pro Management Panel</h1>

    <div class="tabs">
        <button class="tab-btn active" id="btnUsers" onclick="switchTab('users')">All Users</button>
        <button class="tab-btn" id="btnConflicts" onclick="switchTab('conflicts')">IP Conflicts</button>
        <button class="tab-btn" id="btnPlans" onclick="switchTab('plans')">Plan Creator</button>
    </div>
    
    <div id="viewUsers" class="container">
        <table>
            <thead>
                <tr>
                    <th>Client ID</th>
                    <th>Mobile</th>
                    <th>Seller Name</th>
                    <th>Status</th>
                    <th>Current Plan</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userList"></tbody>
        </table>
    </div>

    <div id="viewConflicts" class="container" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>Flagged IP</th>
                    <th>Associated Accounts</th>
                    <th>Latest Registration</th>
                    <th>Quick Action</th>
                </tr>
            </thead>
            <tbody id="conflictList"></tbody>
        </table>
    </div>

  <div id="viewPlans" class="container" style="display:none; padding: 20px;">
    <h3>Plan Management</h3>
    
    <div style="background: #f1f5f9; padding: 20px; border-radius: 12px; display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
        <input type="hidden" id="pId"> 
        <input type="text" id="pName" placeholder="Plan Name">
        <input type="number" id="pDur" placeholder="Months">
        <input type="number" id="pPrice" placeholder="Price (₹)">
        <input type="text" id="pFeat" style="flex-grow:1" placeholder="Features (comma separated)">
        
        <button id="btnSavePlan" class="btn btn-primary" onclick="saveNewPlan()">Create Plan</button>
        <button id="btnUpdatePlan" class="btn btn-verify" style="display:none;" onclick="updateExistingPlan()">Update Plan</button>
        <button id="btnCancelEdit" class="btn btn-block" style="display:none;" onclick="resetPlanForm()">Cancel</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Plan Name</th>
                <th>Duration</th>
                <th>Price</th>
                <th>Features</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="planListBody">
            </tbody>
    </table>
</div>

    <div id="modalOverlay">
        <div class="modal">
            <div class="modal-head">Edit User Subscription</div>
            <div class="modal-body" id="modalContent"></div>
            <div style="padding: 0 20px 20px;">
                <button class="btn" style="background:#64748b; width:100%; padding:10px;" onclick="closeModal()">Close Window</button>
            </div>
        </div>
    </div>

    <script>
        let allUsers = [];
        let dynamicPlans = [];

        async function fetchUsers() {
            const res = await fetch('/api/admin/users');
            allUsers = await res.json();
            
            // Fetch plans first to ensure dropdowns are populated correctly
            const planRes = await fetch('/api/plans');
            dynamicPlans = await planRes.json();
            
            renderUserTable();
            renderConflictTable();
        }

        async function switchTab(tab) {
            const tabs = ['users', 'conflicts', 'plans'];
            tabs.forEach(t => {
                document.getElementById('view' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = tab === t ? 'block' : 'none';
                document.getElementById('btn' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', tab === t);
            });
            if(tab === 'plans') loadPlansAdmin();
        }

        // --- CALCULATION & SAVING LOGIC ---
        function handleModalPlanChange(mobile) {
            const planName = document.getElementById('modalPlanSelect').value;
            const plan = dynamicPlans.find(p => p.name === planName);
            
            if (!plan || planName === "Trial") {
                document.getElementById('modalDateInput').value = "";
                return;
            }

            let date = new Date();
            date.setMonth(date.getMonth() + parseInt(plan.duration));
            document.getElementById('modalDateInput').value = date.toISOString().split('T')[0];
        }

        async function saveFromModal(mobile) {
            const plan = document.getElementById('modalPlanSelect').value;
            const expiry = document.getElementById('modalDateInput').value;
            
            await fetch('/api/admin/update-subscription', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mobile, plan, expiry_date: expiry })
            });
            fetchUsers();
            alert("Subscription Updated!");
        }

        // --- TABLE RENDERING ---
        function renderUserTable() {
            const list = document.getElementById('userList');
            list.innerHTML = allUsers.map(u => `
                <tr>
                    <td><small>${u.client_id || 'N/A'}</small></td>
                    <td><b>${u.mobile}</b></td>
                    <td>${u.seller_name || 'N/A'}</td>
                    <td>
                        ${u.is_online ? '<b style="color:var(--success)">● Online</b>' : '<span style="color:#94a3b8">○ Offline</span>'}
                        <br><small>${u.is_verified === 1 ? '✅ Active' : u.is_verified === -1 ? '❌ Blocked' : '⏳ Trial'}</small>
                    </td>
                    <td>
                        <b>${u.plan || 'Trial'}</b><br>
                        <small>Exp: ${u.expiry_date ? new Date(u.expiry_date).toLocaleDateString() : 'N/A'}</small>
                    </td>
                    <td>
                        <button class="btn btn-view" onclick="openSubscriptionModal('${u.mobile}')">Edit / View</button>
                        <button class="btn btn-verify" onclick="updateStatus('${u.mobile}', 1)">Verify</button>
                        <button class="btn btn-block" onclick="updateStatus('${u.mobile}', -1)">Block</button>
                        <button class="btn btn-delete" onclick="deleteUser('${u.mobile}')">Del</button>
                    </td>
                </tr>`).join('');
        }

        function openSubscriptionModal(mobile) {
            const user = allUsers.find(u => u.mobile === mobile);
            if(!user) return;

            const existingDate = user.expiry_date ? new Date(user.expiry_date).toISOString().split('T')[0] : '';
            
            const planOptions = dynamicPlans.map(p => 
                `<option value="${p.name}" ${user.plan === p.name ? 'selected' : ''}>${p.name} (${p.duration} Mo)</option>`
            ).join('');

            document.getElementById('modalContent').innerHTML = `
                <div class="info-row"><span class="label">Client ID:</span> <span>${user.client_id || 'N/A'}</span></div>
                                <div class="info-row"><span class="label">Seller Name:</span> <span>${user.seller_name || 'N/A'}</span></div>
                <div class="info-row"><span class="label">Mobile:</span> <span>${user.mobile}</span></div>
                                <div class="info-row"><span class="label">Email:</span> <span>${user.email || 'N/A'}</span></div>
                <div class="info-row"><span class="label">GST:</span> <span>${user.gst_number || 'N/A'}</span></div>
                 <div class="info-row"><span class="label">User Password:</span> <span>${user.password || 'N/A'}</span></div>
                <div class="info-row"><span class="label">IP Address:</span> <span style="color:var(--primary)">${user.user_ip || 'N/A'}</span></div>
                
                <div class="action-area">
                    <label class="label">Update Subscription Plan:</label>
                    <select class="plan-select" id="modalPlanSelect" onchange="handleModalPlanChange('${mobile}')">
                        <option value="Trial" ${user.plan === 'Trial' ? 'selected' : ''}>Trial</option>
                        ${planOptions}
                    </select>

                    <label class="label">Expiry Date (Manual/Auto):</label>
                    <input type="date" class="date-input" id="modalDateInput" value="${existingDate}">
                    
                    <button class="btn btn-primary" style="width:100%; margin-top:10px; padding:10px" onclick="saveFromModal('${mobile}')">Save Changes</button>
                </div>
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function renderConflictTable() {
            const list = document.getElementById('conflictList');
            const groups = {};
            allUsers.forEach(u => {
                if (u.user_ip) {
                    if (!groups[u.user_ip]) groups[u.user_ip] = [];
                    groups[u.user_ip].push(u);
                }
            });
            const conflicts = Object.keys(groups).filter(ip => groups[ip].length > 1);
            list.innerHTML = conflicts.map(ip => {
                const sortedUsers = groups[ip].sort((a, b) => new Date(a.reg_date) - new Date(b.reg_date));
                return `
                    <tr>
                        <td><span class="conflict-tag">${ip}</span></td>
                        <td>${sortedUsers.map((u, i) => `<div style="font-size:12px;">${i==0?'⭐':''} ${u.mobile} (${u.seller_name || 'N/A'})</div>`).join('')}</td>
                        <td>${new Date(sortedUsers[sortedUsers.length-1].reg_date).toLocaleString()}</td>
                        <td><button class="btn btn-block" onclick="blockConflicts('${ip}')">Block All Conflicts</button></td>
                    </tr>`;
            }).join('');
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        async function updateStatus(mobile, status) {
            await fetch('/api/admin/update-status', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ mobile, status }) });
            fetchUsers();
        }

        async function deleteUser(mobile) {
            if(confirm("Delete User Permanently?")) {
                await fetch('/api/admin/delete-user', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ mobile }) });
                fetchUsers();
            }
        }

        async function saveNewPlan() {
            const data = {
                name: document.getElementById('pName').value,
                duration: document.getElementById('pDur').value,
                price: document.getElementById('pPrice').value,
                features: document.getElementById('pFeat').value.split(',')
            };
            if(!data.name || !data.duration) return alert("Fill plan details");
            await fetch('/api/admin/plans/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            loadPlansAdmin();
            fetchUsers(); // Refresh plan list in user table logic
            alert("Plan Saved!");
        }

     function editPlan(id) {
    const plan = dynamicPlans.find(p => p._id === id);
    if(!plan) return;

    // Fill the form
    document.getElementById('pId').value = plan._id;
    document.getElementById('pName').value = plan.name;
    document.getElementById('pDur').value = plan.duration;
    document.getElementById('pPrice').value = plan.price;
    document.getElementById('pFeat').value = plan.features.join(',');

    // Toggle Buttons
    document.getElementById('btnSavePlan').style.display = 'none';
    document.getElementById('btnUpdatePlan').style.display = 'inline-block';
    document.getElementById('btnCancelEdit').style.display = 'inline-block';
}

function resetPlanForm() {
    document.getElementById('pId').value = '';
    document.getElementById('pName').value = '';
    document.getElementById('pDur').value = '';
    document.getElementById('pPrice').value = '';
    document.getElementById('pFeat').value = '';
    
    document.getElementById('btnSavePlan').style.display = 'inline-block';
    document.getElementById('btnUpdatePlan').style.display = 'none';
    document.getElementById('btnCancelEdit').style.display = 'none';
}

async function updateExistingPlan() {
    const id = document.getElementById('pId').value;
    const data = {
        name: document.getElementById('pName').value,
        duration: document.getElementById('pDur').value,
        price: document.getElementById('pPrice').value,
        features: document.getElementById('pFeat').value.split(',')
    };

    const res = await fetch(`/api/admin/plans/update/${id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    
    const result = await res.json();
    if(result.success) {
        alert("Plan Updated!");
        resetPlanForm();
        loadPlansAdmin();
    }
}

// Update the loadPlansAdmin to include the Edit button in the table
async function loadPlansAdmin() {
    const res = await fetch('/api/plans');
    const plans = await res.json();
    dynamicPlans = plans;
    document.getElementById('planListBody').innerHTML = plans.map(p => `
        <tr>
            <td><b>${p.name}</b></td>
            <td>${p.duration} Months</td>
            <td>₹${p.price}</td>
            <td>${p.features.join(', ')}</td>
            <td>
                <button class="btn btn-view" onclick="editPlan('${p._id}')">Edit</button>
                <button class="btn btn-delete" onclick="deletePlan('${p._id}')">Delete</button>
            </td>
        </tr>`).join('');
}

       async function deletePlan(id) {
    if(confirm("Delete this plan?")) {
        // This generates the URL: /api/admin/plans/delete/69c159...
        const res = await fetch(`/api/admin/plans/delete/${id}`, { 
            method: 'DELETE' 
        });
        const result = await res.json();
        if(result.success) {
            loadPlansAdmin();
            fetchUsers();
        } else {
            alert("Error deleting plan");
        }
    }
}

        fetchUsers();
    </script>
</body>
</html>
