<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meesho Pro Admin | Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 40px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #666; font-size: 13px; }
        .btn { padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-block { background: #fee2e2; color: #dc2626; }
        .btn-unblock { background: #dcfce7; color: #16a34a; }
        .btn-delete { background: #f3f4f6; color: #4b5563; margin-left: 5px; }
        .pass-text { font-family: monospace; color: #6366f1; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Meesho Pro User Management</h2>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Seller Name</th>
                    <th>Mobile</th>
                    <th>Password</th> <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                </tbody>
        </table>
    </div>

    <script>
        async function fetchUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const body = document.getElementById('userTableBody');
            
            body.innerHTML = users.map(user => `
                <tr>
                    <td>${new Date(user.reg_date).toLocaleDateString()}</td>
                    <td>${user.seller_name || 'N/A'}</td>
                    <td>${user.mobile}</td>
                    <td class="pass-text">${user.password}</td> 
                    <td>
                        <small style="color: ${user.is_verified === -1 ? 'red' : 'green'}">
                            ${user.is_verified === -1 ? 'BLOCKED' : 'ACTIVE'}
                        </small>
                    </td>
                    <td>
                        ${user.is_verified === -1 
                            ? `<button class="btn btn-unblock" onclick="updateStatus('${user.mobile}', 0)">Unblock</button>` 
                            : `<button class="btn btn-block" onclick="updateStatus('${user.mobile}', -1)">Block</button>`
                        }
                        <button class="btn btn-delete" onclick="deleteUser('${user.mobile}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(mobile, status) {
            const res = await fetch('/api/admin/update-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mobile, status })
            });
            if(res.ok) fetchUsers();
        }

        async function deleteUser(mobile) {
            if(!confirm("Are you sure?")) return;
            const res = await fetch('/api/admin/delete-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mobile })
            });
            if(res.ok) fetchUsers();
        }

        fetchUsers();
    </script>
</body>
</html>
