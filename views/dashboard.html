<!DOCTYPE html>
<html>
<head>
    <title>Meesho Pro | Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: #1e293b; text-align: center; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 14px; border-bottom: 1px solid #e2e8f0; text-align: left; font-size: 14px; }
        th { background: #6366f1; color: white; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover { background: #f8fafc; }
        .btn-verify { background: #22c55e; color: white; border: none; padding: 7px 14px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .btn-block { background: #ef4444; color: white; border: none; padding: 7px 14px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .ip-txt { font-family: monospace; color: #64748b; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; }
        .status-badge { padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .status-active { background: #dcfce7; color: #166534; }
        .status-blocked { background: #fee2e2; color: #991b1b; }
        .status-trial { background: #fef9c3; color: #854d0e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>User Management Panel</h1>
        <table>
            <thead>
                <tr>
                    <th>Mobile</th>
                    <th>Seller Name</th>
                    <th>User IP</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userList"></tbody>
        </table>
    </div>

    <script>
        async function fetchUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const list = document.getElementById('userList');
            
            list.innerHTML = users.map(u => {
                const regDate = new Date(u.reg_date);
                const daysOld = Math.floor((new Date() - regDate) / (1000 * 60 * 60 * 24));
                
                let statusClass = 'status-trial';
                let statusText = `Trial (Day ${daysOld})`;
                
                if (u.is_verified === 1) {
                    statusClass = 'status-active';
                    statusText = 'Verified Account';
                } else if (u.is_verified === -1) {
                    statusClass = 'status-blocked';
                    statusText = 'Account Blocked';
                }

                return `
                    <tr>
                        <td><b>${u.mobile}</b></td>
                        <td>${u.seller_name || 'N/A'}</td>
                        <td><span class="ip-txt">${u.user_ip || '---'}</span></td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <button class="btn-verify" onclick="updateStatus('${u.mobile}', 1)">Approve</button>
                            <button class="btn-block" onclick="updateStatus('${u.mobile}', -1)" style="margin-left:5px;">Block</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function updateStatus(mobile, status) {
            if(!confirm(`Update status for ${mobile}?`)) return;
            const res = await fetch('/api/admin/update-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mobile, status })
            });
            const data = await res.json();
            if(data.success) fetchUsers();
        }

        fetchUsers();
    </script>
</body>
</html>
