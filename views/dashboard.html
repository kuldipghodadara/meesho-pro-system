<!DOCTYPE html>
<html>
<head>
    <title>Meesho Pro | Admin</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #5f249f; color: white; }
        .btn-verify { background: green; color: white; border: none; padding: 5px 10px; cursor: pointer; }
        .btn-block { background: red; color: white; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>User Management</h1>
    <table>
        <thead>
            <tr>
                <th>Mobile</th>
                <th>Seller Name</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="userList"></tbody>
    </table>

    <script>
        async function fetchUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const list = document.getElementById('userList');
            list.innerHTML = users.map(u => `
                <tr>
                    <td>${u.mobile}</td>
                    <td>${u.seller_name || 'N/A'}</td>
                    <td>${u.is_verified === 1 ? '✅ Verified' : u.is_verified === -1 ? '❌ Blocked' : '⏳ Pending'}</td>
                    <td>
                        <button class="btn-verify" onclick="updateStatus('${u.mobile}', 1)">Verify</button>
                        <button class="btn-block" onclick="updateStatus('${u.mobile}', -1)">Block</button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(mobile, status) {
            await fetch('/api/admin/update-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mobile, status })
            });
            fetchUsers(); // Refresh list
        }

        fetchUsers();
    </script>
</body>
</html>
