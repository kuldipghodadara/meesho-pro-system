<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meesho Pro | Admin Dashboard</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --danger: #ef4444; --success: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 30px; margin: 0; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #f1f5f9; padding: 12px; font-size: 13px; color: #64748b; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .pass-text { font-family: monospace; color: var(--primary); font-weight: bold; }
        .btn { border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .btn-block { background: #fee2e2; color: var(--danger); }
        .btn-unblock { background: #dcfce7; color: var(--success); }
        .btn-delete { background: #f1f5f9; color: #64748b; margin-left: 5px; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .status-active { background: #dcfce7; color: var(--success); }
        .status-blocked { background: #fee2e2; color: var(--danger); }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin-top:0;">Meesho Pro User Management</h2>
        <table>
            <thead>
                <tr>
                    <th>Registration Date</th>
                    <th>Seller Name</th>
                    <th>Mobile Number</th>
                    <th>Password</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                </tbody>
        </table>
    </div>

    <script>
        async function fetchUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const body = document.getElementById('userTableBody');
            
            body.innerHTML = users.map(user => `
                <tr>
                    <td>${new Date(user.reg_date).toLocaleDateString()}</td>
                    <td>${user.seller_name || 'N/A'}</td>
                    <td>${user.mobile}</td>
                    <td class="pass-text">${user.raw_password || 'N/A'}</td>
                    <td>
                        <span class="status-badge ${user.is_verified === -1 ? 'status-blocked' : 'status-active'}">
                            ${user.is_verified === -1 ? 'BLOCKED' : 'ACTIVE'}
                        </span>
                    </td>
                    <td>
                        ${user.is_verified === -1 
                            ? `<button class="btn btn-unblock" onclick="updateStatus('${user.mobile}', 1)">Unblock</button>` 
                            : `<button class="btn btn-block" onclick="updateStatus('${user.mobile}', -1)">Block</button>`
                        }
                        <button class="btn btn-delete" onclick="deleteUser('${user.mobile}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(mobile, status) {
            const res = await fetch('/api/admin/update-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mobile, status })
            });
            if(res.ok) fetchUsers();
        }

        async function deleteUser(mobile) {
            if(!confirm("Are you sure you want to delete this user forever?")) return;
            const res = await fetch('/api/admin/delete-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mobile })
            });
            if(res.ok) fetchUsers();
        }

        fetchUsers();
    </script>
</body>
</html>
